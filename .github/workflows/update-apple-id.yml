name: Auto Update Apple IDs

on:
  schedule:
    # 每天每 4 小时自动运行一次 (例如: 00:00, 04:00, 08:00...)
    # 注意：这里的 cron 是 UTC 时间，比北京时间晚 8 小时
    - cron: '0 */4 * * *'
  workflow_dispatch: # 允许在 GitHub 后台手动点击运行

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予写入权限，以便能推送代码回仓库

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 抓取最新 Apple ID
        run: node scripts/fetch_apple_id.js

      - name: 提交并推送更新
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/airport/apple-id-shared.md
          
          # 检查是否有文件变更
          if git diff --staged --quiet; then
            echo "账号数据没有变化，跳过提交。"
          else
            git commit -m "🤖 自动更新: 抓取最新 Apple ID 共享账号"
            git push
            echo "成功推送到仓库，Cloudflare 将自动触发构建部署！"
          fi
