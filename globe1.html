<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      margin: 0; 
      background: radial-gradient(circle, #ffffff 0%, #f4f7f9 100%); 
      overflow: hidden; 
    } 
  </style>
  <script src="//unpkg.com/globe.gl"></script>
</head>
<body>
  <div id="globeViz"></div>
  <script>
    const GlobeObj = Globe()(document.getElementById('globeViz'))
      .backgroundColor('rgba(0,0,0,0)') 
      .showGlobe(false) 
      .showAtmosphere(true)
      .atmosphereColor('#cbd5e0') // Neutral light gray-blue atmosphere, no light blue
      .atmosphereAltitude(0.2);
      
    fetch('//unpkg.com/globe.gl/example/datasets/ne_110m_admin_0_countries.geojson')
      .then(r => r.json())
      .then(countries => {
        GlobeObj.polygonsData(countries.features)
          .polygonCapColor(() => '#cfd8dc') // Darker gray for continents (Blue Gray 100)
          .polygonSideColor(() => 'rgba(0, 0, 0, 0.05)')
          .polygonStrokeColor(() => '#b0bec5') // Neutral stroke
          .polygonAltitude(0.01);
      });

    // Red and Blue minimal lines
    const N = 12; 
    const arcsData = [...Array(N).keys()].map(() => ({
      startLat: (Math.random() - 0.5) * 140,
      startLng: (Math.random() - 0.5) * 360,
      endLat: (Math.random() - 0.5) * 140,
      endLng: (Math.random() - 0.5) * 360,
      color: Math.random() > 0.5 ? '#e53935' : '#1e88e5' // Material Red and Material Blue
    }));
    
    GlobeObj.arcsData(arcsData)
      .arcColor('color')
      .arcDashLength(0.6)
      .arcDashGap(0.1)
      .arcDashAnimateTime(2800)
      .arcStroke(0.5);   
         
    GlobeObj.controls().autoRotate = true;
    GlobeObj.controls().autoRotateSpeed = 0.8;
    
    GlobeObj.pointOfView({ lat: 20, lng: 0, altitude: 2.2 });
  </script>
</body>
</html>
