<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="globe-grad" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fce4f0"/>
      <stop offset="40%" stop-color="#d63384"/>
      <stop offset="100%" stop-color="#7c0b3e"/>
    </radialGradient>
    <radialGradient id="shine" cx="38%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circ">
      <circle cx="100" cy="100" r="78"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="185" rx="52" ry="10" fill="rgba(0,0,0,0.15)">
    <animate attributeName="rx" values="52;48;52" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Globe body -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0 0; 0 -6; 0 0" dur="4s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95"/>

    <!-- Sphere base -->
    <circle cx="100" cy="100" r="78" fill="url(#globe-grad)" filter="url(#glow)"/>

    <!-- Grid lines clipped -->
    <g clip-path="url(#circ)" stroke="rgba(255,255,255,0.25)" stroke-width="1" fill="none">
      <!-- Equator -->
      <ellipse cx="100" cy="100" rx="78" ry="19"/>
      <!-- Tropic N -->
      <ellipse cx="100" cy="74" rx="70" ry="14"/>
      <!-- Tropic S -->
      <ellipse cx="100" cy="126" rx="70" ry="14"/>
      <!-- Arctic -->
      <ellipse cx="100" cy="51" rx="46" ry="9"/>
      <!-- Antarctic -->
      <ellipse cx="100" cy="149" rx="46" ry="9"/>

      <!-- Meridians -->
      <ellipse cx="100" cy="100" rx="24" ry="78"/>
      <ellipse cx="100" cy="100" rx="55" ry="78"/>
      <ellipse cx="100" cy="100" rx="78" ry="78"/>
    </g>

    <!-- Continent blobs -->
    <g clip-path="url(#circ)" fill="rgba(255,255,255,0.22)">
      <!-- Asia/Europe -->
      <path d="M108 70 Q130 60 145 75 Q155 85 148 98 Q140 108 120 105 Q108 100 105 88 Z"/>
      <!-- Africa -->
      <path d="M95 95 Q108 92 112 108 Q113 122 104 130 Q94 133 88 120 Q84 106 88 98 Z"/>
      <!-- Americas -->
      <path d="M52 72 Q64 68 70 80 Q74 90 68 100 Q62 108 54 104 Q46 96 47 84 Z"/>
      <path d="M56 108 Q67 104 70 116 Q71 126 64 132 Q56 135 51 126 Q49 116 53 110 Z"/>
      <!-- Australia -->
      <path d="M136 120 Q148 118 152 128 Q153 138 144 142 Q135 143 131 133 Q129 123 134 120 Z"/>
    </g>

    <!-- Animated highlight dot (satellite) -->
    <circle r="5" fill="rgba(255,200,220,0.9)" filter="url(#glow)">
      <animateMotion dur="8s" repeatCount="indefinite"
        path="M100,22 A78,78 0 1,1 99.9,22 Z"/>
    </circle>

    <!-- Shine overlay -->
    <circle cx="100" cy="100" r="78" fill="url(#shine)"/>

    <!-- Outer ring -->
    <circle cx="100" cy="100" r="78" fill="none" stroke="rgba(214,51,132,0.35)" stroke-width="2"/>
    <circle cx="100" cy="100" r="84" fill="none" stroke="rgba(214,51,132,0.12)" stroke-width="3"/>
  </g>
</svg>
