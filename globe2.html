<!DOCTYPE html>
<html>
<head>
  <style> body { margin: 0; background: #040e19; overflow: hidden; } </style>
  <script src="https://unpkg.com/three"></script>
  <script src="https://unpkg.com/globe.gl"></script>
</head>
<body>
  <div id="globeViz"></div>
  <script>
    const GlobeObj = Globe()(document.getElementById('globeViz'))
      .backgroundColor('#040e19')
      .showGlobe(false) // Use polygons instead of a solid sphere
      .showAtmosphere(true)
      .atmosphereColor('#00ffff')
      .atmosphereAltitude(0.15);
      
    // Load GeoJSON for countries to get the neon green neon outline effect
    fetch('https://unpkg.com/globe.gl/example/datasets/ne_110m_admin_0_countries.geojson')
      .then(r => r.json())
      .then(countries => {
        GlobeObj.polygonsData(countries.features)
          .polygonCapColor(() => '#2ecc71') // Neon green landmass
          .polygonSideColor(() => 'rgba(46, 204, 113, 0.1)')
          .polygonStrokeColor(() => '#00ffff'); // Cyan outlines
      });

    // Add animated expanding rings
    const gData = [...Array(40).keys()].map(() => ({
      lat: (Math.random() - 0.5) * 180,
      lng: (Math.random() - 0.5) * 360,
      maxR: Math.random() * 8 + 3,
      propagationSpeed: (Math.random() - 0.5) * 2 + 3,
      repeatPeriod: Math.random() * 800 + 400
    }));

    GlobeObj.ringsData(gData)
      .ringColor(() => '#00ffff') // Cyan rings
      .ringMaxRadius('maxR')
      .ringPropagationSpeed('propagationSpeed')
      .ringRepeatPeriod('repeatPeriod')
      .pointsData(gData)
      .pointColor(() => '#00ffff')
      .pointAltitude(0.01)
      .pointRadius(0.5);   
         
    GlobeObj.controls().autoRotate = true;
    GlobeObj.controls().autoRotateSpeed = 2.5;
  </script>
</body>
</html>
